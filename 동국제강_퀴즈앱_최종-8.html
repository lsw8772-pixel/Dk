<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동국제강 신입교육 퀴즈</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','맑은 고딕',sans-serif;background:#F7F8FA;color:#111827;padding:20px 16px}
.wrap{max-width:600px;margin:0 auto}
.screen{display:none}.screen.active{display:block}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
h1{font-size:18px;font-weight:700;color:#1A3C6E}
.badge{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600}
.badge-b{background:#EFF6FF;color:#2563EB}
.badge-r{background:#FEF2F2;color:#DC2626}
.card{background:#fff;border:1px solid #E4E7ED;border-radius:12px;padding:18px 16px;margin-bottom:12px}
.srow{display:flex;gap:10px;margin-bottom:20px}
.sc{flex:1;background:#fff;border:1px solid #E4E7ED;border-radius:10px;padding:12px 14px}
.sl{font-size:11px;color:#6B7280;margin-bottom:4px}
.sv{font-size:24px;font-weight:700}
button{padding:9px 18px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:500;border:none}
.btn-primary{background:#2563EB;color:#fff}
.btn-ghost{background:transparent;color:#6B7280;border:1px solid #E4E7ED}
.btn-skip{background:#D97706;color:#fff}
.btn-danger{background:#DC2626;color:#fff}
.btn-outline{background:transparent;color:#1A3C6E;border:1px solid #1A3C6E}
button:disabled{opacity:.4;cursor:default}
.brow{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.hbtn{display:block;width:100%;text-align:left;padding:14px 18px;font-size:15px;border-radius:10px;margin-bottom:10px;background:#fff;border:1px solid #E4E7ED;color:#111827}
.hbtn.primary{background:#2563EB;color:#fff;border:none}
.hbtn.outline{background:transparent;color:#1A3C6E;border:1px solid #1A3C6E}
input,textarea{width:100%;border:1px solid #E4E7ED;border-radius:8px;padding:12px 14px;font-size:15px;font-family:inherit;outline:none;box-sizing:border-box;background:#fff;color:#111827}
textarea{resize:vertical;min-height:70px;font-size:14px}
textarea:disabled{opacity:.65;background:#F9FAFB}
.prog{height:4px;background:#E4E7ED;border-radius:4px;margin-bottom:20px;overflow:hidden}
.pf{height:100%;background:#2563EB;border-radius:4px;transition:width .3s}
.rv{border-radius:8px;padding:12px 14px;margin-top:12px;font-size:14px;line-height:1.7}
.rv-ok{background:#ECFDF5;color:#059669}
.rv-no{background:#FEF2F2;color:#DC2626}
.rv-skip{background:#FFFBEB;color:#D97706}
.lbl{font-size:11px;font-weight:700;opacity:.7;margin-bottom:2px}
.val{white-space:pre-wrap;font-size:13px}
.sep{height:1px;opacity:.2;margin:8px 0}
.wi{border:1px solid #E4E7ED;border-radius:10px;padding:12px 14px;margin-bottom:10px;background:#fff}
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tab{flex:1;padding:8px 0;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:400;border:1px solid #E4E7ED;background:transparent;color:#6B7280}
.tab.active{border-color:#2563EB;background:#EFF6FF;color:#2563EB;font-weight:700}
.empty{text-align:center;padding:2rem;color:#9CA3AF;font-size:14px}
.cnt-btn{padding:7px 14px;border-radius:8px;border:1px solid #E4E7ED;background:#fff;font-size:14px;cursor:pointer;font-family:inherit;font-weight:500;color:#374151}
.cnt-btn.active{background:#2563EB;color:#fff;border-color:#2563EB}
#custom-popup{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9999;align-items:center;justify-content:center}
#custom-popup.show{display:flex}
.popup-box{background:#fff;border-radius:16px;padding:24px 20px;max-width:300px;width:90%;text-align:center}
.popup-img{width:140px;height:186px;object-fit:cover;border-radius:10px;margin-bottom:14px}
.popup-msg{font-size:17px;font-weight:700;color:#111827;margin-bottom:16px}
.popup-ok{background:#2563EB;color:#fff;border:none;border-radius:8px;padding:10px 30px;font-size:15px;cursor:pointer;font-family:inherit;font-weight:600}
.qnum{font-size:11px;color:#9CA3AF;margin-bottom:6px}
.qtext{font-size:15px;line-height:1.8;margin-bottom:16px;white-space:pre-wrap}
.lb-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;border:1px solid #E4E7ED;margin-bottom:8px;background:#fff}
.lb-row.gold{background:#FFFBEB}
.user-tag{font-size:13px;color:#6B7280;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">

<!-- 로그인 -->
<div id="s-login" class="screen active">
  <div style="text-align:center;padding-top:60px;padding-bottom:40px">
    <div style="font-size:36px;margin-bottom:10px">🏭</div>
    <div style="font-size:22px;font-weight:700;color:#1A3C6E;margin-bottom:6px">동국제강 신입교육 퀴즈</div>
    <div style="font-size:13px;color:#6B7280">이름을 입력하면 풀이 기록이 저장됩니다</div>
  </div>
  <div class="card">
    <div style="font-size:13px;color:#6B7280;margin-bottom:8px">이름</div>
    <input id="name-input" placeholder="예) 이시우" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-primary" style="width:100%;margin-top:12px;padding:13px;font-size:15px" onclick="doLogin()" id="login-btn">시작하기 →</button>
  </div>
</div>

<!-- 홈 -->
<div id="s-home" class="screen">
  <div class="hdr">
    <h1>동국제강 퀴즈</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="home-wrong-badge" class="badge badge-r" style="display:none"></span>
      <span class="user-tag" id="home-user" onclick="goLogin()"></span>
    </div>
  </div>
  <div class="srow">
    <div class="sc"><div class="sl">전체 문항</div><div class="sv">84</div></div>
    <div class="sc"><div class="sl">오답 누적</div><div class="sv" id="home-wc">0</div></div>
    <div class="sc"><div class="sl">완료 세션</div><div class="sv" id="home-sess">0</div></div>
  </div>
  <div style="margin-bottom:10px">
  <div style="font-size:13px;color:#6B7280;margin-bottom:6px">문항 수 선택</div>
  <div style="display:flex;gap:8px;margin-bottom:8px">
    <button class="cnt-btn active" onclick="setCnt(15,this)">15</button>
    <button class="cnt-btn" onclick="setCnt(20,this)">20</button>
    <button class="cnt-btn" onclick="setCnt(30,this)">30</button>
    <button class="cnt-btn" onclick="setCnt(40,this)">40</button>
    <button class="cnt-btn" onclick="setCnt(84,this)">전체</button>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <input id="cnt-input" type="number" min="1" max="84" placeholder="직접 입력 (1~84)" style="flex:1;padding:9px 12px;font-size:14px;border:1px solid #E4E7ED;border-radius:8px;outline:none" oninput="setCustomCnt(this.value)">
    <span style="font-size:13px;color:#6B7280">문항</span>
  </div>
</div>
<button class="hbtn primary" onclick="startQuiz('random')" id="btn-random-start">랜덤 <span id="cnt-display">15</span>문제 풀기 →</button>
  <button class="hbtn outline" id="btn-wrong-start" onclick="startQuiz('wrong')" disabled>오답 재풀이 →</button>
  <button class="hbtn" onclick="goScreen('s-notes');renderNotes()">오답노트 보기</button>
</div>

<!-- 퀴즈 -->
<div id="s-quiz" class="screen">
  <div class="hdr">
    <h1 id="quiz-title">랜덤 퀴즈</h1>
    <span class="badge badge-b" id="q-badge">1 / 15</span>
  </div>
  <div class="prog"><div class="pf" id="pf" style="width:0%"></div></div>
  <div class="card">
    <div class="qnum" id="q-num"></div>
    <div class="qtext" id="q-text"></div>
    <textarea id="ans-ta" placeholder="답을 입력하세요 (Enter로 채점, Shift+Enter 줄바꿈)"></textarea>
    <div id="rv-box" style="display:none"></div>
  </div>
  <div class="brow">
    <button class="btn-ghost" onclick="clearProgress();goScreen('s-home');updateHome()">그만두기</button>
    <button class="btn-skip" id="btn-skip" onclick="skipQ()">넘기기</button>
    <button class="btn-primary" id="btn-check" onclick="checkAnswer()">채점하기</button>
    <button class="btn-primary" id="btn-next" style="display:none" onclick="nextQ()">다음 →</button>
  </div>
</div>

<!-- 결과 -->
<div id="s-result" class="screen">
  <div class="hdr"><h1>결과</h1></div>
  <div class="srow">
    <div class="sc"><div class="sl">맞힌 문제</div><div class="sv" id="res-cor" style="color:#059669">0</div></div>
    <div class="sc"><div class="sl">틀린 문제</div><div class="sv" id="res-wr" style="color:#DC2626">0</div></div>
    <div class="sc"><div class="sl">정답률</div><div class="sv" id="res-rate">0%</div></div>
  </div>
  <div id="res-list"></div>
  <div class="brow">
    <button class="btn-ghost" onclick="goScreen('s-home');updateHome()">홈으로</button>
    <button class="btn-primary" id="btn-retry" style="display:none" onclick="startQuiz('wrong')">오답 재풀이</button>
  </div>
</div>

<!-- 오답노트 -->
<div id="s-notes" class="screen">
  <div class="hdr">
    <h1>오답노트</h1>
    <span class="badge badge-r" id="notes-cnt"></span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="setNF('all',this)">전체</button>
    <button class="tab" onclick="setNF('freq',this)">자주 틀림</button>
    <button class="tab" onclick="setNF('recent',this)">최근 틀림</button>
  </div>
  <div id="notes-list"></div>
  <div class="brow">
    <button class="btn-danger" onclick="clearWrong()">오답 초기화</button>
    <button class="btn-ghost" onclick="goScreen('s-home');updateHome()">홈으로</button>
  </div>
</div>

</div>

<!-- 커스텀 팝업 -->
<div id="custom-popup">
  <div class="popup-box">
    <img class="popup-img" id="popup-img" src="" alt="">
    <div class="popup-msg" id="popup-msg"></div>
    <button class="popup-ok" onclick="document.getElementById('custom-popup').classList.remove('show')">확인</button>
  </div>
</div>

[29,"임직원 자녀 대학 학자금 지원의 경우 반기 최대( )만원, 연( )만원을 한도로 지급된다.","반기 500만원 / 연 1000만원",[["500"],["1000"]]],

function saveProgress(quizList, idx, correct, sessionWrong, mode, cnt){
  try{
    const prog = {quizList, idx, correct, sessionWrong, mode, cnt, ts: Date.now()};
    setStorage('dks_prog_'+UN, JSON.stringify(prog));
  }catch(e){}
}
function loadProgress(){
  try{
    const d = getStorage('dks_prog_'+UN);
    return d ? JSON.parse(d) : null;
  }catch(e){ return null; }
}
function clearProgress(){
  try{ localStorage.removeItem('dks_prog_'+UN); sessionStorage.removeItem('dks_prog_'+UN); }catch(e){}
}
function getStorage(key){
  try{ const v=localStorage.getItem(key); if(v!==null)return v; }catch(e){}
  try{ return sessionStorage.getItem(key); }catch(e){}
  return null;
}
function setStorage(key,val){
  try{ localStorage.setItem(key,val); return; }catch(e){}
  try{ sessionStorage.setItem(key,val); }catch(e){}
}
function getUD(){
  try{
    const d=getStorage('dks_'+UN);
    return d?JSON.parse(d):{wrongMap:{},sessions:0,recentQueue:[]};
  }catch(e){return{wrongMap:{},sessions:0,recentQueue:[]};}
}
function saveUD(ud){
  try{ setStorage('dks_'+UN,JSON.stringify(ud)); }catch(e){}
}


function goScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goLogin(){ goScreen('s-login'); }

function doLogin(){
  const n=document.getElementById('name-input').value.trim();
  if(!n)return;
  UN=n;
  document.getElementById('home-user').textContent='👤 '+UN;
  updateHome();
  // 이어풀기 확인
  const prog = loadProgress();
  if(prog && prog.quizList && prog.idx < prog.quizList.length){
    const elapsed = Math.floor((Date.now()-prog.ts)/60000);
    const msg = elapsed < 60
      ? `${elapsed}분 전에 풀던 문제가 있어요.\n(${prog.idx+1}/${prog.quizList.length}번째 진행 중)\n이어서 풀까요?`
      : `이전에 풀던 문제가 있어요.\n(${prog.idx+1}/${prog.quizList.length}번째 진행 중)\n이어서 풀까요?`;
    if(confirm(msg)){
      // 이어풀기
      quiz = prog.quizList;
      qi = prog.idx;
      cor = prog.correct;
      sw = prog.sessionWrong || [];
      mode = prog.mode || 'random';
      quizCnt = prog.cnt || 15;
      document.getElementById('quiz-title').textContent = mode==='wrong'?'오답 재풀이':'랜덤 퀴즈';
      goScreen('s-quiz');
      renderQ();
      return;
    } else {
      clearProgress();
    }
  }
  goScreen('s-home');
}

function updateHome(){
  const ud=getUD();
  const wc=Object.keys(ud.wrongMap).length;
  document.getElementById('home-wc').textContent=wc;
  document.getElementById('home-wc').style.color=wc>0?'#DC2626':'#111827';
  document.getElementById('home-sess').textContent=ud.sessions;
  const wb=document.getElementById('home-wrong-badge');
  if(wc>0){wb.textContent=wc+'개 오답';wb.style.display='';}else{wb.style.display='none';}
  document.getElementById('btn-wrong-start').disabled=wc===0;
}

function startQuiz(m){
  mode=m; sw=[]; cor=0; qi=0;
  const ud=getUD();
  if(m==='wrong'){
    const ids=Object.keys(ud.wrongMap).map(Number);
    if(!ids.length){alert('오답 문항이 없습니다.');return;}
    quiz=shuf(ALL_QS.filter(q=>ids.includes(q[0]))).slice(0,Math.min(quizCnt,ids.length));
  }else{
    let pool;
    if(quizCnt >= ALL_QS.length){
      // 전체 선택: 균등 로직 무시, 전체 셔플
      pool = ALL_QS;
      ud.recentQueue = [];
    } else {
      const fresh=ALL_QS.filter(q=>!ud.recentQueue.includes(q[0]));
      pool = fresh.length >= quizCnt ? fresh : ALL_QS;
    }
    quiz=shuf(pool).slice(0, Math.min(quizCnt, ALL_QS.length));
    ud.recentQueue=[...ud.recentQueue,...quiz.map(q=>q[0])].slice(-QS);
    saveUD(ud);
  }
  document.getElementById('quiz-title').textContent=m==='wrong'?'오답 재풀이':'랜덤 퀴즈';
  goScreen('s-quiz');
  renderQ();
}

function renderQ(){
  const q=quiz[qi];
  document.getElementById('q-badge').textContent=(qi+1)+' / '+quiz.length;
  document.getElementById('q-num').textContent='Q'+q[0];
  document.getElementById('q-text').textContent=q[1];
  document.getElementById('ans-ta').value='';
  document.getElementById('ans-ta').disabled=false;
  document.getElementById('rv-box').style.display='none';
  document.getElementById('btn-skip').style.display='';
  document.getElementById('btn-check').style.display='';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('pf').style.width=(qi/quiz.length*100)+'%';
  document.getElementById('ans-ta').focus();
  // 진행상태 저장
  saveProgress(quiz, qi, cor, sw, mode, quizCnt);
}

document.getElementById('ans-ta').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    if(document.getElementById('btn-check').style.display!=='none') checkAnswer();
    else if(document.getElementById('btn-next').style.display!=='none') nextQ();
  }
});

function judgeAnswer(ok, skip){
  const q=quiz[qi];
  const ud=getUD();
  document.getElementById('ans-ta').disabled=true;
  document.getElementById('btn-skip').style.display='none';
  document.getElementById('btn-check').style.display='none';
  document.getElementById('btn-next').style.display='';
  const rv=document.getElementById('rv-box');
  rv.style.display='';
  const ans=document.getElementById('ans-ta').value;
  if(skip){
    rv.className='rv rv-skip';
    rv.innerHTML='<div class="lbl">⏭ 넘겼습니다 — 오답 처리</div><div class="sep" style="background:#D97706"></div><div class="lbl">정답</div><div class="val">'+q[2]+'</div>';
  }else if(ok){
    rv.className='rv rv-ok';
    rv.innerHTML='<div class="lbl">내 답</div><div class="val">'+ans+'</div><div class="sep" style="background:#059669"></div><div class="lbl">정답</div><div class="val">'+q[2]+'</div>';
  }else{
    rv.className='rv rv-no';
    rv.innerHTML='<div class="lbl">내 답</div><div class="val">'+ans+'</div><div class="sep" style="background:#DC2626"></div><div class="lbl">정답</div><div class="val">'+q[2]+'</div>';
  }
  if(ok){
    cor++;
    if(ud.wrongMap[q[0]]){
      ud.wrongMap[q[0]].resolved=(ud.wrongMap[q[0]].resolved||0)+1;
      if(ud.wrongMap[q[0]].resolved>=2)delete ud.wrongMap[q[0]];
    }
  }else{
    sw.push(q);
    if(!ud.wrongMap[q[0]])ud.wrongMap[q[0]]={q:q[1],a:q[2],count:0,date:'',resolved:0};
    ud.wrongMap[q[0]].count=(ud.wrongMap[q[0]].count||0)+1;
    ud.wrongMap[q[0]].date=new Date().toLocaleDateString('ko-KR');
    ud.wrongMap[q[0]].resolved=0;
  }
  saveUD(ud);
}

function skipQ(){ judgeAnswer(false,true); }
function checkAnswer(){
  const ans=document.getElementById('ans-ta').value.trim();
  if(!ans){alert('답을 입력해주세요.');return;}
  judgeAnswer(score(ans,quiz[qi][3]),false);
}

function nextQ(){
  if(qi<quiz.length-1){qi++;renderQ();}
  else{
    const ud=getUD();ud.sessions++;saveUD(ud);
    showResult();
  }
}

function showResult(){
  clearProgress();
  const rate = Math.round(cor/quiz.length*100);
  if(rate >= 90) setTimeout(()=>showPopup('공부 적당히 하셈 😎', false), 300);
  else if(rate <= 70) setTimeout(()=>showPopup('공부 좀 하셈 📚', true), 300);
  document.getElementById('res-cor').textContent=cor;
  document.getElementById('res-wr').textContent=quiz.length-cor;
  document.getElementById('res-rate').textContent=Math.round(cor/quiz.length*100)+'%';
  const list=document.getElementById('res-list');
  if(sw.length>0){
    list.innerHTML='<div style="font-size:13px;font-weight:700;color:#6B7280;margin-bottom:10px">이번 오답 목록</div>'+
    sw.map(q=>'<div class="wi"><div style="font-size:11px;color:#9CA3AF;margin-bottom:4px">Q'+q[0]+'</div><div style="font-size:13px;margin-bottom:6px;white-space:pre-wrap">'+q[1]+'</div><div style="font-size:12px;color:#059669">정답: '+q[2]+'</div></div>').join('');
    document.getElementById('btn-retry').style.display='';
  }else{
    list.innerHTML='<div class="empty">모두 맞혔습니다! 🎉</div>';
    document.getElementById('btn-retry').style.display='none';
  }
  goScreen('s-result');
}

function renderNotes(){
  const ud=getUD();
  let entries=Object.entries(ud.wrongMap);
  document.getElementById('notes-cnt').textContent=entries.length+'문항';
  if(nf==='freq') entries.sort((a,b)=>(b[1].count||0)-(a[1].count||0));
  else if(nf==='recent') entries.sort((a,b)=>new Date(b[1].date)-new Date(a[1].date));
  const list=document.getElementById('notes-list');
  if(!entries.length){list.innerHTML='<div class="empty">오답이 없습니다.</div>';return;}
  list.innerHTML=entries.map(([id,info])=>'<div class="wi"><div style="font-size:11px;color:#9CA3AF;margin-bottom:4px">Q'+id+' · '+info.date+' · '+info.count+'회 틀림</div><div style="font-size:13px;margin-bottom:6px;white-space:pre-wrap">'+info.q+'</div><div style="font-size:12px;color:#059669">정답: '+info.a+'</div></div>').join('');
}

function setNF(f,el){
  nf=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderNotes();
}

function clearWrong(){
  if(!confirm('오답노트를 초기화할까요?'))return;
  const ud=getUD();ud.wrongMap={};saveUD(ud);renderNotes();updateHome();
}
</script>
</body>
</html>
